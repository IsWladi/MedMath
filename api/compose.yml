services:
  postgres:
    container_name: medmath-bdd
    image: postgres:16.3-alpine3.20
    # restart: always
    environment:
      POSTGRES_USER: iswladi
      POSTGRES_PASSWORD: iswladi123456789
      POSTGRES_DB: medmathdb
    # ports:
    #   - "5432:5432"
    # volumes:
      # - postgres-medmath:/var/lib/postgresql/data

  apirest:
    container_name: medmath-api
    build: .
    command: >
        sh -c "./mvnw clean install compile
        && ./mvnw spring-boot:run"
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/medmathdb
      - SPRING_DATASOURCE_USERNAME=iswladi
      - SPRING_DATASOURCE_PASSWORD=iswladi123456789
      - SPRING_DATASOURCE_DB=medmathdb

# volumes:
#   postgres-medmath:
